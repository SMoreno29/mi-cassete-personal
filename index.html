<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Mixtape</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="mixtape-header">
        <h1>Mixtape</h1>
        <p>Una colección de canciones y lo que significan.</p>
    </header>

    <main class="cassette-body">
        <div class="cassette-switch">
            <button id="btn-lado-a" class="switch-btn active" onclick="switchSide('A')">LADO A</button>
            <button id="btn-lado-b" class="switch-btn" onclick="switchSide('B')">LADO B</button>
        </div>

        <div id="container-lado-a" class="side-container active"></div>
        <div id="container-lado-b" class="side-container"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
